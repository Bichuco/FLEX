<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 flex items-center justify-center h-screen">

<div class="bg-gray-800 p-8 rounded-3xl w-96 shadow-2xl">

<h1 class="text-3xl font-bold text-white mb-8 text-center">
Crear Cuenta
</h1>

<input id="name" type="text" placeholder="Nombre"
class="w-full mb-4 p-4 rounded-xl bg-gray-700 text-white">

<input id="email" type="email" placeholder="Email"
class="w-full mb-4 p-4 rounded-xl bg-gray-700 text-white">

<input id="password" type="password" placeholder="Contraseña"
class="w-full mb-6 p-4 rounded-xl bg-gray-700 text-white">

<button onclick="register()"
class="w-full bg-green-600 hover:bg-green-700 p-4 rounded-xl text-white font-bold">
Registrarse
</button>

</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>

</body>
</html>
